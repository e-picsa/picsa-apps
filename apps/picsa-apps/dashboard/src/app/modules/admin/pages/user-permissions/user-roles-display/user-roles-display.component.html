<div class="flex flex-wrap gap-1">
  @if (isAdmin()) {
    <mat-chip-option color="accent" selected>Admin</mat-chip-option>
  } @else {
    @for (group of roleGroups(); track group.name) {
      <mat-chip-option [color]="group.color" selected>{{ group.label }}</mat-chip-option>
    }
    @if (roleGroups().length === 0 && !isAdmin()) {
      <span class="text-gray-500 italic">No explicit roles</span>
    }
  }
</div>
