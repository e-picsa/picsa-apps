<h2 mat-dialog-title>Edit User Profile</h2>
<mat-dialog-content>
  <dashboard-profile-form [formGroup]="profileForm" class="min-w-[300px]" />
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button
    matButton="filled"
    color="primary"
    (click)="saveProfile()"
    [disabled]="profileForm.invalid || profileForm.disabled"
  >
    Save
  </button>
</mat-dialog-actions>
