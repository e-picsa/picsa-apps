<div class="page-content min-h-screen flex items-center justify-center bg-gray-50 p-4">
  <div class="w-[400px] max-w-full">
    <mat-card class="!bg-white !text-black rounded-lg overflow-hidden w-full shadow-xl">
      <mat-card-header class="bg-primary text-white p-4 flex justify-center">
        <mat-card-title class="!text-xl !font-normal !mb-0">Password Reset</mat-card-title>
      </mat-card-header>

      <div class="p-6">
        <p class="text-gray-600 mb-6 text-center">Please enter your new password below.</p>

        <form [formGroup]="form" (ngSubmit)="handlePasswordReset()" class="flex flex-col gap-3">
          <mat-form-field appearance="outline" class="w-full">
            <mat-label>New Password</mat-label>
            <input
              matInput
              [type]="showPassword() ? 'text' : 'password'"
              autocomplete="new-password"
              formControlName="password"
            />
            <button mat-icon-button matSuffix (click)="showPassword.set(!showPassword())" type="button">
              <mat-icon>{{ showPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error>Password is required</mat-error>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-full">
            <mat-label>Confirm Password</mat-label>
            <input
              matInput
              [type]="showConfirmPassword() ? 'text' : 'password'"
              autocomplete="new-password"
              formControlName="confirmPassword"
            />
            <button mat-icon-button matSuffix (click)="showConfirmPassword.set(!showConfirmPassword())" type="button">
              <mat-icon>{{ showConfirmPassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            <mat-error>Passwords must match</mat-error>
          </mat-form-field>

          <button
            matButton="filled"
            color="primary"
            class="!h-12 !text-lg w-full mt-2"
            type="submit"
            [disabled]="form.invalid || form.disabled"
          >
            Reset Password
          </button>
        </form>
      </div>
    </mat-card>
  </div>
</div>
