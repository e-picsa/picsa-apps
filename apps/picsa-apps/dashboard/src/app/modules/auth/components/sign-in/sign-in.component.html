<mat-tab-group animationDuration="0ms" class="custom-auth-tabs">
  <!-- Login Tab -->
  <mat-tab label="Login">
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()" class="flex flex-col gap-3">
      <mat-form-field appearance="outline" class="mt-1">
        <mat-label>Email</mat-label>
        <input matInput formControlName="email" type="email" autocomplete="email" />
        <mat-error>Valid email is required</mat-error>
      </mat-form-field>

      <dashboard-password-input [formGroup]="loginForm" />

      <div class="flex justify-end mb-2">
        <button mat-button type="button" class="text-sm !text-primary" (click)="onForgotPassword()">
          Forgot Password?
        </button>
      </div>

      <button
        matButton="filled"
        color="primary"
        class="!h-12 !text-lg w-full"
        type="submit"
        [disabled]="loginForm.invalid || loginForm.disabled"
      >
        Login
      </button>
    </form>
  </mat-tab>

  <!-- Register Tab -->
  <mat-tab label="Register">
    <!-- Custom Step Indicator -->
    <div class="flex flex-col gap-1 mb-4">
      <div class="text-sm text-gray-500">Step {{ stepper.selectedIndex + 1 }} of 3</div>
      <mat-progress-bar mode="determinate" [value]="((stepper.selectedIndex + 1) / 3) * 100"></mat-progress-bar>
    </div>

    <mat-stepper orientation="horizontal" linear #stepper>
      <!-- Step 1: Personal Details -->
      <mat-step [stepControl]="personalDetailsForm">
        <form [formGroup]="personalDetailsForm" class="flex flex-col gap-3">
          <h3 class="text-xl font-medium text-center mb-1">Personal Details</h3>

          <dashboard-profile-form [formGroup]="personalDetailsForm" [showProfessionalDetails]="false" />

          <mat-form-field appearance="outline">
            <mat-label>Email</mat-label>
            <input matInput formControlName="email" type="email" autocomplete="email" />
            <mat-error>Valid email is required</mat-error>
          </mat-form-field>

          <div class="flex justify-end">
            <button matButton="filled" color="primary" matStepperNext>Next</button>
          </div>
        </form>
      </mat-step>

      <!-- Step 2: Professional Details -->
      <mat-step [stepControl]="professionalDetailsForm">
        <form [formGroup]="professionalDetailsForm" class="flex flex-col gap-3">
          <h3 class="text-xl font-medium text-center mb-1">Professional Details</h3>

          <dashboard-profile-form
            [formGroup]="professionalDetailsForm"
            [showFullName]="false"
            [showProfessionalDetails]="true"
          />

          <div class="flex justify-between items-center">
            <button mat-button matStepperPrevious type="button" class="text-gray-600">
              <mat-icon>arrow_back</mat-icon> Back
            </button>
            <button matButton="filled" color="primary" matStepperNext>Next</button>
          </div>
        </form>
      </mat-step>

      <!-- Step 3: Security -->
      <mat-step [stepControl]="securityForm">
        <form [formGroup]="securityForm" (ngSubmit)="onRegister()" class="flex flex-col gap-3">
          <h3 class="text-xl font-medium text-center mb-1">Security</h3>

          <dashboard-password-input [formGroup]="securityForm" autocomplete="new-password" />

          <!-- Password Strength Indicator -->
          <dashboard-password-strength [password]="securityForm.get('password')?.value || ''" />

          <dashboard-password-input
            [formGroup]="securityForm"
            controlName="passwordConfirm"
            label="Repeat Password"
            autocomplete="new-password"
          />

          <p class="text-xs text-center text-gray-500 mt-0 mb-2">
            By signing up, you agree to our
            <a routerLink="/terms-of-service" target="_blank" class="text-primary hover:underline">Terms of Use</a>.
          </p>

          <div class="flex justify-between items-center gap-2">
            <button mat-button matStepperPrevious type="button" class="text-gray-600">
              <mat-icon>arrow_back</mat-icon> Back
            </button>
            <button
              matButton="filled"
              color="primary"
              class="!h-12 !text-lg flex-1"
              type="submit"
              [disabled]="
                personalDetailsForm.invalid ||
                professionalDetailsForm.invalid ||
                securityForm.invalid ||
                securityForm.disabled
              "
            >
              Register
            </button>
          </div>
        </form>
      </mat-step>
    </mat-stepper>
  </mat-tab>
</mat-tab-group>
