<h2 class="text-center">Deployment Overview</h2>

<div class="grid grid-cols-2 md:grid-cols-3 gap-4 m-4">
  @for (resolved of resolvedComponents(); track resolved.href) {
    <mat-card [routerLink]="resolved.href" class="basic-link-card">
      <mat-card-header class="link-label">
        <div>{{ resolved.label }}</div>
      </mat-card-header>
      <mat-card-content>
        @if (resolved.error) {
          <mat-icon>error</mat-icon>
          <p>{{ resolved.error }}</p>
        } @else {
          @if (resolved.loadedComponent) {
            <ng-container *ngComponentOutlet="resolved.loadedComponent" />
          }
        }
      </mat-card-content>
    </mat-card>
  }
</div>
