<?xml version="1.0" encoding="UTF-8"?>
<svg width="320" height="640" viewBox="0 0 320 640" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">
  <defs>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dx="0" dy="10" result="offsetblur"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Phone Frame -->
  <rect x="0" y="0" width="320" height="640" rx="48" fill="#000000" filter="url(#shadow)"/>

  <!-- Screen Bezel -->
  <rect x="12" y="12" width="296" height="616" rx="40" fill="#ffffff"/>

  <!-- Image -->
  <clipPath id="screen-clip">
    <rect x="12" y="12" width="296" height="616" rx="40"/>
  </clipPath>
  <image href="data:image/png;base64," x="12" y="12" width="296" height="616" clip-path="url(#screen-clip)" preserveAspectRatio="xMidYMid slice"/>

  <!-- Notch -->
  <path d="M 96 12 L 224 12 L 224 24 Q 224 36 212 36 L 108 36 Q 96 36 96 24 Z" fill="#000000"/>

  <!-- Home Indicator -->
  <rect x="96" y="624" width="128" height="4" rx="2" fill="#000000" opacity="0.3"/>

  <!-- Side Buttons -->
  <rect x="316" y="96" width="4" height="48" rx="1" fill="#000000" opacity="0.8"/>
  <rect x="0" y="80" width="4" height="32" rx="1" fill="#000000" opacity="0.8"/>
  <rect x="0" y="128" width="4" height="48" rx="1" fill="#000000" opacity="0.8"/>
  <rect x="0" y="192" width="4" height="48" rx="1" fill="#000000" opacity="0.8"/>
</svg>