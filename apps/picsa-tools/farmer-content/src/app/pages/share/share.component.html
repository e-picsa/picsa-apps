<div class="share-page">
  <div class="share-card">
    <h1 class="title">{{ 'App Installation Check' | translate }}</h1>

    <div class="icon-wrap">
      <img class="install-hero-image" src="/assets/images/mobile.svg" alt="" />
    </div>

    <p class="question">{{ 'Does the user have the E-PICSA App installed?' | translate }}</p>

    <button mat-raised-button color="primary" class="action-btn" (click)="selectInstalledAnswer(true)">
      <mat-icon>check</mat-icon>
      {{ 'Yes' | translate }}
    </button>

    <button mat-raised-button color="primary" class="action-btn" (click)="selectInstalledAnswer(false)">
      <mat-icon>close</mat-icon>
      {{ 'No' | translate }}
    </button>
  </div>
</div>
