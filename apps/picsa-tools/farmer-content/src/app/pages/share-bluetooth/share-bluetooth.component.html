<div class="share-page">
  <div class="page-header">
    <button mat-button type="button" class="back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      {{ 'Share via Bluetooth' | translate }}
    </button>
  </div>

  <div class="share-card">
    <div class="icon-wrap">
      <img class="install-hero-image" src="/assets/images/mobile.svg" alt="" />
    </div>

    <button mat-raised-button color="primary" class="action-btn" (click)="shareAppApk()">
      <mat-icon>android</mat-icon>
      {{ 'Share the E-PICSA app' | translate }}
    </button>

    <button mat-raised-button color="primary" class="action-btn" (click)="goToVideoShare()">
      <mat-icon>video_library</mat-icon>
      {{ 'Share E-PICSA video' | translate }}
    </button>

    @if (shareStatus() !== 'idle') {
      <p class="status" [attr.data-status]="shareStatus()">{{ shareStatusLabel() | translate }}</p>
    }
  </div>
</div>
