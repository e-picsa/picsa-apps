<!-- Single View  -->
@if (selectedVideoResource(); as video) {
<div class="relative">
  <picsa-video-player #videoPlayer [source]="dl.fileURI()" [thumbnail]="video.cover?.image" [onlineVideoUrl]="video.url"
    [id]="video.id">
  </picsa-video-player>

  <button class="video-language-select" (click)="dialog.open(localeSelect)">
    @for (option of videoVariantOptions(); track option.value) {
    {{ option.label }}
    }
  </button>

  <resource-download #dl [resource]="video" [showSize]="true" [size]="48" styleVariant="white" class="video-downloader"
    [attr.data-status]="dl.downloadStatus()"></resource-download>
</div>
}
<ng-template #localeSelect>
  <farmer-step-video-language-select [videoOptions]="rankedVideos()"></farmer-step-video-language-select>
</ng-template>
