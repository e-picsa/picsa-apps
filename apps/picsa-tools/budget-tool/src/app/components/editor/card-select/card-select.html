@for (card of enterpriseCards; track card) {
<budget-card [card]="card" (click)="onCardClicked(card)" [selected]="selected[card.id]" animate.enter="fade-in-delayed" animate.leave="fade-out-delayed"></budget-card>
} @if (!showAllCards) {
<div animate.enter="fade-in-delayed" animate.leave="fade-out-delayed">
  <button matButton (click)="showAllCards = true">{{ 'Show More' | translate }}</button>
</div>
} @if(showAllCards){ @for (card of otherCards; track card) {
<budget-card [card]="card" (click)="onCardClicked(card)" [selected]="selected[card.id]" animate.enter="fade-in-delayed" animate.leave="fade-out-delayed"></budget-card>
}
<budget-card-new (cardSaved)="onCardCreated($event)" [type]="type" animate.enter="fade-in-delayed" animate.leave="fade-out-delayed"></budget-card-new>
}
