@if (terciles.lower; as tercile) {
  <div class="label" id="lowerTercile" [style.left]="tercile.labelPosition.x" [style.top]="tercile.labelPosition.y">
    Lower = {{ tercile.value }}
  </div>
}
@if (terciles.upper; as tercile) {
  <div class="label" id="upperTercile" [style.left]="tercile.labelPosition.x" [style.top]="tercile.labelPosition.y">
    Upper = {{ tercile.value }}
  </div>
}
