<h1 mat-dialog-title>{{ 'Share Chart' | translate }}</h1>
<div mat-dialog-content>
  <div class="button-grid">
    <button matButton class="share-button" (click)="sharePicture()" [disabled]="disabled()" style="margin-right: 4px">
      <div style="margin-top: 8px">
        <img
          src="assets/budget-icons/share-image.svg"
          style="height: 100px"
          [attr.data-disabled]="disabled() || null"
        />
        <div>{{ 'Print Version' | translate }}</div>
      </div>
    </button>
    <!-- <button matButton class="share-button" (click)="shareLink()" [disabled]="disabled()" style="margin-left: 4px">
    <div style="margin-top: 8px">
      <img src="assets/budget-icons/share-mobile.svg" style="height: 100px" [attr.data-disabled]="disabled() || null" />
      <div>{{ 'Share App Link' | translate }}</div>
    </div>
  </button> -->
  </div>
</div>
<div class="status-message">{{ status() }}</div>
<div mat-dialog-actions>
  <button matButton mat-dialog-close>{{ 'Close' | translate }}</button>
</div>
