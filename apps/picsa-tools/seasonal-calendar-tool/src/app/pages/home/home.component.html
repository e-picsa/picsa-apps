<div class="page-content">
  <h2>{{ 'Saved Calendars' | translate }}</h2>
  <div class="calendar-list">
    @if (dbCalendars().length === 0) {
      <div class="feedbackMessage">{{ 'No saved calendars' | translate }}</div>
    }
    <!-- Calendar list items -->
    @for (calendar of dbCalendars(); track calendar.id) {
      <mat-card class="calendars-display" [routerLink]="calendar.id">
        <mat-card-content>
          <div style="display: flex">
            <mat-card-title style="flex: 1">
              {{ calendar.name }}
            </mat-card-title>
            <button matIconButton [matMenuTriggerFor]="budgetMenu" (click)="handleMenuClick($event, calendar)">
              <mat-icon>more_vert</mat-icon>
            </button>
          </div>
        </mat-card-content>
      </mat-card>
    }
  </div>
  <!-- Create calendar button -->
  <div class="sticky-footer">
    <button matButton="elevated" class="footer-button" color="primary" routerLink="create">
      <mat-icon>add</mat-icon>
      {{ 'Create' | translate }}
    </button>
  </div>
</div>

<!-- Popup menu -->
<mat-menu #budgetMenu="matMenu">
  <button mat-menu-item aria-label="Copy" (click)="dialog.open(copyDialog)">
    <mat-icon>content_copy</mat-icon>{{ 'Copy' | translate }}
  </button>
  <button mat-menu-item aria-label="Delete" color="light" (click)="promptDelete()">
    <mat-icon>delete</mat-icon>
    {{ 'Delete' | translate }}
  </button>
</mat-menu>

<!-- Copy Dialog -->
<ng-template #copyDialog>
  <mat-form-field>
    <mat-label>{{ 'Name' | translate }}</mat-label>
    <input matInput type="text" [value]="copyName()" (input)="copyName.set($event.target.value)" />
  </mat-form-field>
  <button matButton="elevated" color="primary" (click)="saveCopy()">
    <mat-icon>copy</mat-icon>{{ 'Save Copy' | translate }}
  </button>
</ng-template>
