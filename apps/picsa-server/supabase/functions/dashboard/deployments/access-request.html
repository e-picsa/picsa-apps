<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Access Request</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        line-height: 1.6;
        color: #333333;
        margin: 0;
        padding: 0;
        background-color: #f4f4f5;
      }
      .container {
        max-width: 600px;
        margin: 40px auto;
        background-color: #ffffff;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        overflow: hidden;
      }
      .header {
        background-color: #0f172a;
        padding: 30px;
        text-align: center;
      }
      .header h1 {
        color: #ffffff;
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.5px;
      }
      .content {
        padding: 40px 30px;
      }
      .greeting {
        font-size: 18px;
        margin-bottom: 20px;
        color: #111827;
      }
      .message {
        margin-bottom: 30px;
        color: #4b5563;
      }
      .button-container {
        text-align: center;
        margin: 30px 0;
      }
      .button {
        display: inline-block;
        background-color: #2563eb;
        color: #ffffff;
        padding: 14px 28px;
        border-radius: 6px;
        text-decoration: none;
        font-weight: 600;
        font-size: 16px;
        transition: background-color 0.2s;
      }
      .button:hover {
        background-color: #1d4ed8;
      }
      .footer {
        background-color: #f9fafb;
        padding: 20px;
        text-align: center;
        font-size: 12px;
        color: #9ca3af;
        border-top: 1px solid #e5e7eb;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <h1>Action Required: New Access Request</h1>
      </div>
      <div class="content">
        <div class="greeting">Hello!</div>
        <div class="message">
          <strong>{{fullName}}</strong> ({{organisation}}, <em>{{requesterEmail}}</em>) has requested access to
          deployment <strong>{{deploymentLabel}}</strong>. <br /><br />

          {{requestMessage}} Please log in to the dashboard to review, approve, or reject this request.
        </div>
        <div class="button-container">
          <a href="https://dashboard.picsa.app" class="button">Go to Dashboard</a>
        </div>
      </div>
    </div>
  </body>
</html>
