# PR-Agent GitHub Action Workflow
# Documentation: https://docs.pr-agent.ai/installation/github/

name: Gemini PR Agent

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr_agent_job:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Adds 👀 reaction to acknowledge slash command comment immediately
      - name: Acknowledge Slash Command
        if: github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/')
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.rest.reactions.createForIssueComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: context.payload.comment.id,
                content: 'eyes'
              });
            } catch (err) {
              console.log('Failed to add reaction:', err.message);
            }

      # Rewrites `/summary` to `/describe` in the event payload so PR-Agent processes it natively
      - name: Alias /summary to /describe
        if: github.event_name == 'issue_comment' && contains(github.event.comment.body, '/summary')
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const eventPath = process.env.GITHUB_EVENT_PATH;
            const eventData = JSON.parse(fs.readFileSync(eventPath, 'utf8'));
            if (eventData.comment && eventData.comment.body) {
              eventData.comment.body = eventData.comment.body.replace('/summary', '/describe');
              fs.writeFileSync(eventPath, JSON.stringify(eventData, null, 2));
            }

      - name: PR Agent Action
        uses: the-pr-agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961 #v0.39.0
        id: pragent
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          github_action_config.auto_review: 'true'
          github_action_config.auto_describe: 'true'
          github_action_config.auto_improve: 'true'
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested", "synchronize"]'
          # github_action_config.config_branch: 'feat/pr-agent'

      - name: Cooldown before Retry
        if: steps.pragent.outcome == 'failure' || steps.pragent.outputs.review == ''
        run: |
          echo "PR Agent attempt 1 failed or generated empty output. Cooling down for 15s..."
          sleep 30

      - name: PR Agent Action (Attempt 2)
        if: steps.pragent.outcome == 'failure' || steps.pragent.outputs.review == ''
        uses: the-pr-agent/pr-agent@8e4d32e5497defd43c023a404f73560c62728961 #v0.39.0
        id: pragent_retry
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOOGLE_AI_STUDIO.GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          github_action_config.auto_review: 'true'
          github_action_config.auto_describe: 'true'
          github_action_config.auto_improve: 'true'
          github_action_config.pr_actions: '["opened", "reopened", "ready_for_review", "review_requested", "synchronize"]'

      - name: Verify PR Agent Output & Track Failures
        if: always()
        run: |
          OUTCOME1="${{ steps.pragent.outcome }}"
          OUTCOME2="${{ steps.pragent_retry.outcome }}"
          REVIEW1="${{ steps.pragent.outputs.review }}"
          REVIEW2="${{ steps.pragent_retry.outputs.review }}"

          echo "Attempt 1: outcome=$OUTCOME1 review_length=${#REVIEW1}"
          echo "Attempt 2: outcome=$OUTCOME2 review_length=${#REVIEW2}"

          if [ "$OUTCOME1" = "success" ] && [ -n "$REVIEW1" ]; then
            echo "PR Agent completed successfully on attempt 1."
          elif [ "$OUTCOME2" = "success" ] && [ -n "$REVIEW2" ]; then
            echo "PR Agent completed successfully on attempt 2 (retry)."
          else
            echo "### ❌ PR Agent Action Failed after Retries" >> $GITHUB_STEP_SUMMARY
            echo "Attempt 1 outcome: **$OUTCOME1** (review output populated: $([ -n "$REVIEW1" ] && echo "yes" || echo "no"))" >> $GITHUB_STEP_SUMMARY
            echo "Attempt 2 outcome: **$OUTCOME2** (review output populated: $([ -n "$REVIEW2" ] && echo "yes" || echo "no"))" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
