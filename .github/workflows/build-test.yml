# Ensure build and tests pass

name: Build Test
on:
  pull_request:
    branches:
      - main

# Only keep one active build per ref (e.g. pr branch, push branch, triggering workflow ref)
concurrency:
  group: app-build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # read-write token provided by secret. All other workflows will use hardcoded readonly
      NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}
    steps:
      - uses: actions/checkout@v6
        with:
          lfs: true
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: "yarn"

      - name: Install node modules
        run: yarn install --immutable

      - run: yarn lint
      # - run: yarn nx test
      # Ensure can also build

      - run: yarn nx build
