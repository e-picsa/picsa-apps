<div class="page-content">
  <h2>Photos Debug</h2>
  <picsa-photo-list album="debug" #photoList />
  <div class="mt-2 flex gap-4 items-center">
    <picsa-photo-input album="debug" />
    <button matButton (click)="handlePhotoShareClick()" [disabled]="service.isSharingPhotos()">
      <mat-icon>share</mat-icon>
      @if (photoList.selectedCount()) {
        Share {{ photoList.selectedCount() }} Photos
      } @else {
        Share
      }
    </button>
  </div>
</div>
