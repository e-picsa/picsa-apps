@if (uri()) {
  <img [src]="uri()" [alt]="photo().name" />
}
@if (errorMsg()) {
  <div class="error-msg">{{ errorMsg() }}</div>
}

<ng-template #dialogTemplate>
  <div class="photo-dialog">
    <button matIconButton (click)="photoDialog.closeAll()" class="dialog-close-button" aria-label="Close photo viewer">
      <mat-icon>close</mat-icon>
    </button>
    <img [src]="uri()" [alt]="photo().name" style="flex: 1" />
    <div class="dialog-actions">
      <button matButton="filled" color="primary" (click)="promptShare()" class="share-button" aria-label="Share photo">
        <mat-icon>share</mat-icon>
        {{ 'Share' | translate }}
      </button>
      <button
        matButton="filled"
        (click)="promptDelete()"
        color="secondary"
        class="delete-button"
        aria-label="Delete photo"
      >
        <mat-icon>delete</mat-icon>
        {{ 'Delete' | translate }}
      </button>
    </div>
  </div>
</ng-template>
