@if (photos().length === 0) {
  <div class="no-photos-message">{{ 'No photos added' | translate }}</div>
} @else {
  <div class="photo-list-toolbar">
    @if (!selectionMode()) {
      <button matButton="filled" color="primary" (click)="enableSelection()">
        <mat-icon>select_all</mat-icon>
        {{ 'Select' | translate }}
      </button>
    } @else {
      <div class="selection-summary">{{ selectedCount() }} selected</div>
      <button matButton="filled" color="primary" (click)="shareSelected()" [disabled]="selectedCount() === 0">
        <mat-icon>share</mat-icon>
        {{ 'Share' | translate }}
      </button>
      <button matButton (click)="cancelSelection()">
        <mat-icon>close</mat-icon>
        {{ 'Cancel' | translate }}
      </button>
    }
  </div>

  <div class="photo-grid">
    @for (photo of photos(); track photo.id) {
      <div class="photo-tile" [class.is-selected]="isSelected(photo.id)">
        <picsa-photo-view
          [photo]="photo"
          [selectable]="selectionMode()"
          [selected]="isSelected(photo.id)"
          (selectedChange)="toggleSelected(photo.id)"
        ></picsa-photo-view>
      </div>
    }
  </div>
}
