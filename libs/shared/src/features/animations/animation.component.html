<!-- TODO - consider support for inline animation again in the future if required -->

<ng-template #dialogTemplate>
  <div class="animation-background">
    @if (options(); as animationOptions) {
      <ng-lottie
        id="animation-container"
        [options]="animationOptions"
        (loopComplete)="loopComplete($event)"
      ></ng-lottie>
    }
  </div>
</ng-template>
