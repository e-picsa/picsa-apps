<div class="display-container">
  @if (selectedOptions().length > 0) {
    <div class="selected-icons" (click)="dialog.open(inputDialog)">
      @for (option of selectedOptions(); track option.id) {
        <mat-icon [svgIcon]="'picsa_weather:' + option.svgIcon"></mat-icon>
      }
    </div>
  } @else {
    <button style="height: 100%" mat-stroked-button (click)="dialog.open(inputDialog)">
      <mat-icon>cloud</mat-icon>
      +
    </button>
  }
</div>

<!-- Dialog -->
<ng-template #inputDialog>
  <div class="select-container">
    @for (option of filteredOptions(); track option.id) {
      <div
        class="option-container"
        [attr.data-selected]="value().includes(option.id)"
        (click)="handleSelect(option.id)"
      >
        <div class="option-label">{{ option.label | translate }}</div>
        <mat-icon class="option-icon" [svgIcon]="'picsa_weather:' + option.svgIcon"></mat-icon>
      </div>
    }
  </div>
</ng-template>
