<div class="display-container">
  @if (value() && selectedOption(); as option) {
    <div (click)="dialog.open(inputDialog)" style="height: 100%; width: 100%">
      <mat-icon style="height: 100%; width: 100%" [svgIcon]="'picsa_weather:' + option.svgIcon"></mat-icon>
    </div>
  } @else {
    <button style="height: 100%" matButton="outlined" (click)="dialog.open(inputDialog)">
      <mat-icon>cloud</mat-icon>
      +
    </button>
  }
</div>

<!-- Dialog -->
<ng-template #inputDialog>
  <button matButton="outlined" color="primary" mat-dialog-close class="mb-4 ml-auto p-2 min-h-10">
    {{ 'Close' | translate }}
    <mat-icon>close</mat-icon>
  </button>
  <div class="select-container">
    @for (option of filteredOptions(); track option.id) {
      <div class="option-container" [attr.data-selected]="option.id === value()" (click)="value.set(option.id)">
        <div class="option-label">{{ option.label | translate }}</div>
        <mat-icon class="option-icon" [svgIcon]="'picsa_weather:' + option.svgIcon"></mat-icon>
      </div>
    }
  </div>
</ng-template>
