# PR-Agent Configuration
# Documentation: https://docs.pr-agent.ai/

# https://docs.pr-agent.ai/installation/github/?h=fallback_models#using-configuration-files
# https://docs.pr-agent.ai/tools/describe/#configuration-options

# https://ai.google.dev/gemini-api/docs/models

[config]
model = "gemini/gemini-3.6-flash"
fallback_models = ["openrouter/minimax/minimax-m3", "openrouter/google/gemini-3.6-flash"]
# max tokens required for newer models not known by current version of pr-agent used in actions 
# use lowest common of fallback models
custom_model_max_tokens = 1048576
ai_timeout = 180

# 1. Controls /describe tool
[pr_description]
publish_description_as_comment = false
keep_original_user_description = true
use_description_markers = true

# 2. Controls /review tool
[pr_reviewer]
enable_inline_comments = false
num_code_suggestions = 3
extra_instructions = """
Focus strictly on material issues: logic errors, race conditions, edge cases, missing error boundaries, and security vulnerabilities.
Ignore minor style formatting, variable naming preferences, and cosmetic refactoring.
"""

# 3. Controls /improve tool
[pr_code_suggestions]
num_code_suggestions_per_chunk = 4
suggestions_score_threshold=6
extra_instructions = """
Only offer code suggestions if they directly fix a bug, improve performance significantly, or eliminate a security risk.
"""
dual_publishing_score_threshold = 8
